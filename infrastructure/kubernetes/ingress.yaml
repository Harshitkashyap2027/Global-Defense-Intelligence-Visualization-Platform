apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gdivp-ingress
  namespace: gdivp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "gdivp/websocket-headers"
spec:
  ingressClassName: nginx
  rules:
    - host: gdivp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: websocket-headers
  namespace: gdivp
data:
  Upgrade: "$http_upgrade"
  Connection: "upgrade"
